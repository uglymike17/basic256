name: Build BASIC-256
on:
  push:
    branches: [ main, master ]
  pull_request:
  release:
    types: [created]

env:
  QT_VERSION: 5.15.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            use_jurplel: true
            qt_arch: gcc_64
            artifact_name: BASIC256-Linux-x86_64
          - os: windows-latest
            arch: x86_64
            use_jurplel: true
            qt_arch: win64_mingw81
            artifact_name: BASIC256-Windows

    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2

    # Install Qt via jurplel for x86_64 Linux and Windows
    - name: Install Qt (jurplel)
      if: matrix.use_jurplel == true
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        arch: ${{ matrix.qt_arch }}

    # Install Qt via apt for ARM Linux
    - name: Install Qt (apt for ARM)
      if: matrix.use_jurplel == false
      run: |
        sudo apt update
        sudo apt install -y \
          qt5-qmake \
          qtbase5-dev \
          qttools5-dev \
          libqt5sql5-sqlite \
          libqt5serialport5-dev \
          libqt5printsupport5 \
          libqt5multimedia5 \
          qtmultimedia5-dev \
          libqt5texttospeech5-dev \
          libgl1-mesa-dev \
          flex bison

    # ---------------------------
    # Linux x86_64 Build
    # ---------------------------
    - name: Build Linux x86_64
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y build-essential libgl1-mesa-dev libx11-dev libxext-dev \
          libxrender-dev libxi-dev libxkbcommon-x11-0 \
          flex bison
        cd LEX && make && cd ..
        qmake BASIC256.pro CONFIG+=release
        make -j$(nproc)

    # ---------------------------
    # Linux ARM Build
    # ---------------------------
    - name: Build Linux ARM
      if: matrix.os == 'ubuntu-24.04-arm'
      run: |
        cd LEX && make && cd ..
        qmake BASIC256.pro CONFIG+=release
        make -j$(nproc)

    # ---------------------------
    # Windows Build
    # ---------------------------
    - name: Install flex and bison (Windows)
      if: runner.os == 'Windows'
      run: choco install winflexbison3 -y

    - name: Disable eSpeak in .pro file (Windows)
      if: runner.os == 'Windows'
      run: |
        (Get-Content BASIC256.pro) `
          -replace 'DEFINES\s*\+=\s*ESPEAK', '#DEFINES += ESPEAK' |
          Set-Content BASIC256.pro
        echo "--- Checking ESPEAK lines after patch ---"
        Select-String -Path BASIC256.pro -Pattern "ESPEAK"
        
    - name: Run Build (Windows)
      if: runner.os == 'Windows'
      env:
        BISON_PKGDATADIR: C:\ProgramData\chocolatey\lib\winflexbison3\tools\data
      run: |
        $qtBin = "${{ env.Qt5_Dir }}\bin"
        $mingwBin = "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin"
        $bisonBin = "C:\ProgramData\chocolatey\lib\winflexbison3\tools"
        $env:Path = "$qtBin;$mingwBin;$bisonBin;" + $env:Path

        if (Test-Path "tmp") { Remove-Item -Recurse "tmp" }
        if (Test-Path "release") { Remove-Item -Recurse "release" }

        Copy-Item "$bisonBin\win_flex.exe" "$bisonBin\flex.exe" -Force
        Copy-Item "$bisonBin\win_bison.exe" "$bisonBin\bison.exe" -Force

        cd LEX
        mingw32-make
        cd ..

        qmake BASIC256.pro -spec win32-g++ "QT+=multimediawidgets" "CONFIG+=release" "DEFINES-=ESPEAK"
        mingw32-make -j2

    # ---------------------------
    # Packaging Linux x86_64
    # ---------------------------
    - name: Package Linux x86_64
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p dist
        cp basic256 dist/
        cp -r Examples dist/ || true
        cp README.md dist/ || true
        cp $Qt5_Dir/lib/libQt5Multimedia.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5MultimediaWidgets.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5Widgets.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5Gui.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5Core.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5Sql.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5PrintSupport.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5SerialPort.so.5 dist/ || true
        cp $Qt5_Dir/lib/libQt5TextToSpeech.so.5 dist/ || true
        tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    # ---------------------------
    # Packaging Linux ARM
    # ---------------------------
    - name: Package Linux ARM
      if: matrix.os == 'ubuntu-24.04-arm'
      run: |
        mkdir -p dist
        cp README.md dist/ || true

        # Find and copy Qt5 libraries from system location
        QT_LIB_DIR=$(qmake -query QT_INSTALL_LIBS)
        echo "Qt libs located at: $QT_LIB_DIR"

        for lib in \
          libQt5Core \
          libQt5Gui \
          libQt5Widgets \
          libQt5Multimedia \
          libQt5MultimediaWidgets \
          libQt5Sql \
          libQt5PrintSupport \
          libQt5SerialPort \
          libQt5TextToSpeech \
          libQt5Network \
          libQt5DBus \
          libQt5XcbQpa; do
            find $QT_LIB_DIR /usr/lib -name "${lib}.so.5" 2>/dev/null | head -1 | xargs -I{} cp {} dist/ || true
        done

        # Copy Qt plugins needed at runtime
        mkdir -p dist/plugins/platforms
        mkdir -p dist/plugins/sqldrivers
        mkdir -p dist/plugins/audio
        QT_PLUGIN_DIR=$(qmake -query QT_INSTALL_PLUGINS)
        cp $QT_PLUGIN_DIR/platforms/libqxcb.so dist/plugins/platforms/ || true
        cp $QT_PLUGIN_DIR/sqldrivers/libqsqlite.so dist/plugins/sqldrivers/ || true
        cp $QT_PLUGIN_DIR/audio/libqtaudio_alsa.so dist/plugins/audio/ || true

        # Add a launcher script that sets library path
        printf '#!/bin/bash\n' > dist/run_basic256.sh
        printf 'DIR="$(cd "$(dirname "$0")" && pwd)"\n' >> dist/run_basic256.sh
        printf 'export LD_LIBRARY_PATH="$DIR:$LD_LIBRARY_PATH"\n' >> dist/run_basic256.sh
        printf 'export QT_PLUGIN_PATH="$DIR/plugins"\n' >> dist/run_basic256.sh
        printf 'exec "$DIR/basic256" "$@"\n' >> dist/run_basic256.sh
        chmod +x dist/run_basic256.sh

        tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    # ---------------------------
    # Packaging Windows
    # ---------------------------
    - name: Package Windows Build

      if: runner.os == 'Windows'
      run: |
        mkdir dist
        "@echo off" > dist\basic256.bat
        echo set QT_OPENGL=desktop >> dist\basic256.bat
        echo start basic256.exe >> dist\basic256.bat
        Copy-Item release\basic256.exe dist\
        & "${{ env.Qt5_Dir }}\bin\windeployqt.exe" `
          --dir dist `
          --multimedia `
          --no-translations `
          dist\basic256.exe
        if (Test-Path "dist\translations") {
            Move-Item "dist\translations" "dist\Translations_Temp"
            Move-Item "dist\Translations_Temp" "dist\Translations" -Force
        }
        if (-not (Test-Path "dist\Translations")) {
            New-Item -ItemType Directory -Path "dist\Translations" | Out-Null
        }
        if (Test-Path "Translations") {
            Copy-Item "Translations\*.qm" "dist\Translations\" -Force
        }
        Remove-Item "dist\libGLESv2.dll", "dist\libEGL.dll", "dist\opengl32sw.dll" -ErrorAction SilentlyContinue
        Copy-Item "${{ env.Qt5_Dir }}\bin\Qt5OpenGL.dll" dist\ -Force
        Copy-Item "${{ env.Qt5_Dir }}\bin\Qt5MultimediaWidgets.dll" dist\ -Force
        Copy-Item "${{ env.Qt5_Dir }}\bin\Qt5PrintSupport.dll" dist\ -Force
        Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact_name }}.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4.6.2
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          *.tar.gz
          *.zip

  # ---------------------------
  # Release job (only on tag)
  # ---------------------------
  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.3.0
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.tar.gz
          **/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
