name: Build BASIC-256_2.0.99.10.2 CMake
on:
  push:
    branches: [ build2.0.99.10.2 ]
  pull_request:
  release:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: ubuntu-22.04  # <-- Change from ubuntu-latest to ubuntu-22.04
          #   arch: x86_64
          #   use_jurplel: false
          #   qt_arch: gcc_64
          #   artifact_name: BASIC256-Linux-x86_64
          - os: windows-latest
            arch: x86_64
            use_jurplel: false
            qt_arch: win64_msvc2019_64  # Updated for MSVC 2019 / 2022 compatibility
            artifact_name: BASIC256-Windows
          # - os: ubuntu-24.04-arm
          #   arch: arm64
          #   use_jurplel: false
          #   artifact_name: BASIC256-RaspberryPi-ARM64  

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    ## Install Qt via jurplel for x86_64 Linux and Windows
    #- name: Install Qt (jurplel)
    #  if: matrix.use_jurplel == true
    #  uses: jurplel/install-qt-action@v3
    #  with:
    #    version: ${{ env.QT_VERSION }}
    #    arch: ${{ matrix.qt_arch }}
    #    cache: true
  
    # ---------------------------
    # Linux x86_64 Build
    # ---------------------------
    - name: Build Linux x86_64
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt update
        sudo apt-get remove -y libunwind-14-dev 
        sudo apt install -y build-essential cmake libgl1-mesa-dev libx11-dev libxext-dev \
          libxrender-dev libxi-dev libxkbcommon-x11-0 flex bison \
          qtbase5-dev qttools5-dev-tools qttools5-dev qtmultimedia5-dev libqt5texttospeech5-dev libqt5serialport5-dev \
          libspeechd-dev libspeechd2 speech-dispatcher libespeak-ng-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
        
        # Configure and Build using CMake
        #cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${Qt5_DIR:-$Qt5_Dir}"
        cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH="${Qt5_DIR:-$Qt5_Dir}"
        cmake --build build --config Release -j$(nproc)

    # -----------------------------------------------------------------
    # Raspberry Pi ARM64 Native Build Flow
    # -----------------------------------------------------------------
    - name: Install dependencies (ARM64)
      if: matrix.arch == 'arm64'
      run: |
        sudo apt-get update && sudo apt-get install -y \
          build-essential cmake flex bison \
          speech-dispatcher \
          libspeechd-dev libspeechd2 \
          libespeak-ng-dev \
          qtbase5-dev qttools5-dev-tools qttools5-dev qtmultimedia5-dev libqt5multimedia5 libqt5texttospeech5 \
          libqt5texttospeech5-dev libqt5serialport5 libqt5serialport5-dev libgl1-mesa-dev \
          libx11-dev patchelf

    - name: Build Raspberry Pi ARM64
      if: matrix.arch == 'arm64'
      run: |
        # 1. Compile using native ARM64 tools
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)

        # 2. Create standalone relocatable distribution folder
        mkdir -p dist/lib dist/plugins
        cp build/basic256 dist/
        patchelf --set-rpath '$ORIGIN/lib' dist/basic256
        find dist/plugins -name "*.so" | while read f; do
          patchelf --set-rpath '$ORIGIN/../../lib:$ORIGIN/../lib:$ORIGIN' "$f" || true
        done
        #printf '[Paths]\nPlugins=plugins\nLibraries=lib\n' > dist/qt.conf

        # 3. Define plugin dir once, used throughout
        QT_PLUGIN_DIR="/usr/lib/aarch64-linux-gnu/qt5/plugins"
        QT_LIB_DIR="/usr/lib/aarch64-linux-gnu"

        # 4. Copy Qt runtime libraries
        #cp $QT_LIB_DIR/libQt5Core.so.*          dist/lib/
        #cp $QT_LIB_DIR/libQt5Gui.so.*           dist/lib/
        #cp $QT_LIB_DIR/libQt5Widgets.so.*       dist/lib/
        #cp $QT_LIB_DIR/libQt5Multimedia.so.*    dist/lib/
        #cp $QT_LIB_DIR/libQt5SerialPort.so.*    dist/lib/
        #cp $QT_LIB_DIR/libQt5TextToSpeech.so.*  dist/lib/
        #cp $QT_LIB_DIR/libQt5PrintSupport.so.*  dist/lib/
        #cp $QT_LIB_DIR/libQt5Sql.so.*           dist/lib/
        #cp $QT_LIB_DIR/libQt5XcbQpa.so.*        dist/lib/
        #cp $QT_LIB_DIR/libQt5DBus.so.*          dist/lib/
        #cp $QT_LIB_DIR/libQt5Network.so.*       dist/lib/
        #cp $QT_LIB_DIR/libssl.so.*              dist/lib/
        #cp $QT_LIB_DIR/libcrypto.so.*           dist/lib/
        #cp $QT_LIB_DIR/libxcb.so.*              dist/lib/ 2>/dev/null || true
        #cp $QT_LIB_DIR/libxcb-*.so.*            dist/lib/ 2>/dev/null || true
        #cp $QT_LIB_DIR/libxkbcommon*.so.*       dist/lib/ 2>/dev/null || true

        # 5. Platform plugins
        mkdir -p dist/plugins/platforms
        cp $QT_PLUGIN_DIR/platforms/libqxcb.so              dist/plugins/platforms/ || true
        cp $QT_PLUGIN_DIR/platforms/libqwayland-generic.so  dist/plugins/platforms/ || true
        cp $QT_PLUGIN_DIR/platforms/libqwayland-egl.so      dist/plugins/platforms/ || true
        cp $QT_PLUGIN_DIR/platforms/libqoffscreen.so        dist/plugins/platforms/ || true

        # 6. Text-to-speech plugins
        mkdir -p dist/plugins/texttospeech

        cp $QT_PLUGIN_DIR/texttospeech/libqtexttospeech_speechd.so \
          dist/plugins/texttospeech/ || true

        cp $QT_PLUGIN_DIR/texttospeech/libqtexttospeech_flite.so \
          dist/plugins/texttospeech/ || true

        # 7. espeak-ng and libjpeg runtime libs (outside any if-block)
        cp $QT_LIB_DIR/libespeak-ng.so.*  dist/lib/ || true
        cp $QT_LIB_DIR/libjpeg.so.*       dist/lib/ || true

        # 8. Media service and image format plugins
        if [ -d $QT_PLUGIN_DIR/mediaservice ]; then
          mkdir -p dist/plugins/mediaservice
          cp $QT_PLUGIN_DIR/mediaservice/* dist/plugins/mediaservice/
        fi

        if [ -d $QT_PLUGIN_DIR/imageformats ]; then
          mkdir -p dist/plugins/imageformats
          cp $QT_PLUGIN_DIR/imageformats/* dist/plugins/imageformats/
        fi

        cp -r Examples dist/

    # ---------------------------
    # Windows Build
    # ---------------------------
    - name: Install flex and bison (Windows)
      if: runner.os == 'Windows'
      run: choco install winflexbison3 -y

    - name: Install Qt
      if: runner.os == 'Windows'
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 5.15.2 win64_msvc2019_64

    - name: Set Qt5_Dir (Windows)
      if: runner.os == 'Windows'
      run: echo "Qt5_Dir=${{ github.workspace }}\5.15.2\msvc2019_64" >> $env:GITHUB_ENV      

    - name: Run Build (Windows)
      if: runner.os == 'Windows'
      env:
        BISON_PKGDATADIR: C:\ProgramData\chocolatey\lib\winflexbison3\tools\data
      run: |
        $bisonBin = "C:\ProgramData\chocolatey\lib\winflexbison3\tools"
        
        # Mirror flex/bison executables so names match standard conventions
        Copy-Item "$bisonBin\win_flex.exe" "$bisonBin\flex.exe" -Force
        Copy-Item "$bisonBin\win_bison.exe" "$bisonBin\bison.exe" -Force
        
        # Add bison tools to path for the lexer build step
        $env:Path = "$bisonBin;" + $env:Path

        # Generate LEX parser files manually using flex/bison direct execution
        cd LEX
        & "$bisonBin\bison.exe" -d -v -l basicParse.y
        & "$bisonBin\flex.exe" -L basicParse.l
        cd ..

        # Configure using MSVC (Omitting -G defaults to the installed Visual Studio version)
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ github.workspace }}\5.15.2\msvc2019_64"
        
        # Build using MSVC compiler pipeline natively via CMake
        cmake --build build --config Release

    # ---------------------------
    # Packaging Linux x86_64
    # ---------------------------
    - name: Package Linux x86_64
      if: matrix.os == 'ubuntu-22.04'
      run: |
        mkdir -p dist
        mkdir -p dist/lib
        mkdir -p dist/plugins/texttospeech
        mkdir -p dist/plugins/mediaservice
        mkdir -p dist/plugins/audio
        mkdir -p dist/plugins/imageformats
        
        cp build/basic256 dist/
        cp -r Examples dist/
        cp -r TestSuite dist/ || true
        cp README.md dist/ || true

        # Point PATH to the exact folder containing the jurplel-installed Qt binaries
        export PATH="$Qt5_Dir/bin:$PATH"
        export QT_PLUGIN_DIR="$Qt5_Dir/plugins"

        # Manually grab the dynamic plugins that linuxdeployqt misses statically
        cp -r $QT_PLUGIN_DIR/texttospeech/*.so dist/plugins/texttospeech/ 2>/dev/null || true
        cp -r $QT_PLUGIN_DIR/mediaservice/*.so dist/plugins/mediaservice/ 2>/dev/null || true
        cp -r $QT_PLUGIN_DIR/audio/*.so dist/plugins/audio/ 2>/dev/null || true
        cp -r $QT_PLUGIN_DIR/imageformats/*.so dist/plugins/imageformats/ 2>/dev/null || true
        cp /usr/lib/x86_64-linux-gnu/libespeak-ng.so.* dist/lib/ || true
        cp /usr/lib/x86_64-linux-gnu/libspeechd.so.* dist/lib/ || true


        # Download linuxdeployqt asset
        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        
        # Force linuxdeployqt to trace dependencies for our manually copied plugins
        EXTRA_ARGS=""
        for plugin in dist/plugins/*/*.so; do
          if [ -f "$plugin" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -executable=$plugin"
          fi
        done
        
        # Run linuxdeployqt with the plugin arguments
        ./linuxdeployqt-continuous-x86_64.AppImage dist/basic256 \
          -bundle-non-qt-libs \
          -extra-plugins=texttospeech,mediaservice,audio,imageformats \
          --appimage-extract-and-run

        # Compress everything into your final delivery asset
        tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    # ---------------------------
    # Packaging Linux ARM
    # ---------------------------
    - name: Package Linux ARM
      if: matrix.os == 'ubuntu-24.04-arm'
      run: |
        cp README.md dist/ || true

        # ICU libraries - required by Qt5Core at runtime for Unicode/locale support
        cp /usr/lib/aarch64-linux-gnu/libicuuc.so.*   dist/lib/
        cp /usr/lib/aarch64-linux-gnu/libicudata.so.* dist/lib/
        cp /usr/lib/aarch64-linux-gnu/libicui18n.so.* dist/lib/
        cp /usr/lib/aarch64-linux-gnu/libspeechd.so.* dist/lib/

        # Patch ALL bundled libs so they resolve dependencies within dist/lib only
        for lib in dist/lib/*.so.* ; do
          [ -f "$lib" ] && patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
        done
        # Patch plugins too — they need to find dist/lib
        for plugin in dist/plugins/**/*.so; do
          [ -f "$plugin" ] && patchelf --set-rpath '$ORIGIN/../../../lib:$ORIGIN/../../lib' "$plugin" 2>/dev/null || true
        done

        # Compiled translations
        mkdir -p dist/Translations
        if ls build/*.qm 1>/dev/null 2>&1; then
          cp build/*.qm dist/Translations/
        elif ls Translations/*.qm 1>/dev/null 2>&1; then
          cp Translations/*.qm dist/Translations/
        fi

        # Launcher script
        cat > dist/run.sh << 'EOF'
        #!/bin/sh
        DIR="$(cd "$(dirname "$0")" && pwd)"
        export LD_LIBRARY_PATH="$DIR/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
        export QT_PLUGIN_PATH="$DIR/plugins"
        export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
        exec "$DIR/basic256" "$@"
        EOF
        chmod +x dist/run.sh

        tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    - name: Verify TTS plugin loads
      if: matrix.arch == 'arm64'
      run: |
        export LD_LIBRARY_PATH="$(pwd)/dist/lib"
        export QT_PLUGIN_PATH="$(pwd)/dist/plugins"
        export QT_DEBUG_PLUGINS=1
        export QT_QPA_PLATFORM=offscreen
        echo "=== TTS plugins ==="
        find dist/plugins/texttospeech -name "*.so"

        echo "=== Dependencies ==="
        ldd dist/plugins/texttospeech/*.so || true
        
    # ---------------------------
    # Packaging Windows (MSVC Migration)
    # ---------------------------
    - name: Package Windows Build
      if: runner.os == 'Windows'
      run: |
        mkdir dist
        Set-Content -Path "dist\basic256.bat" -Value "@echo off`r`nset QT_OPENGL=desktop`r`nstart basic256.exe"
        
        # MSVC multi-config generator outputs binaries into a 'Release' subfolder
        Copy-Item build\Release\basic256.exe dist\

        # Copy Examples directly into the dist folder before compressing
        Copy-Item -Path "Examples" -Destination "dist\Examples" -Recurse -Force       
        
        # Deploy deployment assets using MSVC-built windeployqt
        & "$env:Qt5_Dir\bin\windeployqt.exe" `
          --dir dist `
          --multimedia `
          --no-translations `
          dist\basic256.exe
          
        if (Test-Path "dist\translations") {
            Move-Item "dist\translations" "dist\Translations_Temp"
            Move-Item "dist\Translations_Temp" "dist\Translations" -Force
        }
        if (-not (Test-Path "dist\Translations")) {
            New-Item -ItemType Directory -Path "dist\Translations" | Out-Null
        }
        
        if (Test-Path "build\basic256_en.qm") {
            Copy-Item "build\*.qm" "dist\Translations\" -Force
        } elseif (Test-Path "Translations") {
            Copy-Item "Translations\*.qm" "dist\Translations\" -Force
        }
        
        Remove-Item "dist\libGLESv2.dll", "dist\libEGL.dll", "dist\opengl32sw.dll" -ErrorAction SilentlyContinue
        Copy-Item "$env:Qt5_Dir\bin\Qt5OpenGL.dll" dist\ -Force
        Copy-Item "$env:Qt5_Dir\bin\Qt5MultimediaWidgets.dll" dist\ -Force
        Copy-Item "$env:Qt5_Dir\bin\Qt5PrintSupport.dll" dist\ -Force
        Compress-Archive -Path dist -DestinationPath ${{ matrix.artifact_name }}.zip

    # ---------------------------
    # Upload Artifacts Step
    # ---------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact_name }}
        if-no-files-found: ignore  # Tells the runner to not crash if one of the extensions is missing
        path: |
          ${{ github.workspace }}/*.tar.gz
          ${{ github.workspace }}/*.zip

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.3.0
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.tar.gz
          **/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
