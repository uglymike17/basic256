name: Build BASIC-256_2.0.99.10.2 CMake
on:
  push:
    branches: [ build2.0.99.10.2 ]
  pull_request:
  release:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04  # <-- Change from ubuntu-latest to ubuntu-22.04
            arch: x86_64
            use_jurplel: false
            qt_arch: gcc_64
            artifact_name: BASIC256-Linux-x86_64
          - os: windows-latest
            arch: x86_64
            use_jurplel: false
            qt_arch: win64_msvc2019_64  # Updated for MSVC 2019 / 2022 compatibility
            artifact_name: BASIC256-Windows
          - os: ubuntu-24.04-arm
            arch: arm64
            use_jurplel: false
            artifact_name: BASIC256-RaspberryPi-ARM64  

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
  
    # ---------------------------
    # Linux x86_64 Build
    # ---------------------------
    - name: Build Linux x86_64
      if: matrix.os == 'ubuntu-22.04'
      run: |
        bash .github/scripts/build_Linux_x86.sh

    # -----------------------------------------------------------------
    # Raspberry Pi ARM64 Native Build Flow
    # -----------------------------------------------------------------
    - name: Build RPi 4 (Trixie)
      if: matrix.arch == 'arm64'
      run: |
        bash .github/scripts/build_Linux_RPi_Trixie.sh

    # ---------------------------
    # Windows Build
    # ---------------------------
    - name: Build Windows x86_64
      if: runner.os == 'Windows'
      shell: pwsh
      run: 
        ./.github/scripts/build_windows.ps1

    # ---------------------------
    # Packaging Linux x86_64
    # ---------------------------
    - name: Package Linux x86_64
      if: matrix.os == 'ubuntu-22.04'
      run: |
        bash .github/scripts/package_Linux_x86.sh

    # ---------------------------
    # Packaging Linux ARM
    # ---------------------------
    - name: Package Linux ARM
      if: matrix.os == 'ubuntu-24.04-arm'
      run: |
        bash .github/scripts/package_Linux_RPi_Trixie.sh
        
    # ---------------------------
    # Packaging Windows (MSVC Migration)
    # ---------------------------
    - name: Package Windows Build
      if: runner.os == 'Windows'
      shell: pwsh
      run: 
        ./.github/scripts/package_windows_build.ps1

    # ---------------------------
    # Upload Artifacts Step
    # ---------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact_name }}
        if-no-files-found: ignore  # Tells the runner to not crash if one of the extensions is missing
        path: |
          ${{ github.workspace }}/*.tar.gz
          ${{ github.workspace }}/*.zip

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.3.0
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.tar.gz
          **/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
