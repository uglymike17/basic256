name: Build BASIC-256 CMake
on:
  push:
    branches: [ main, master ]
  pull_request:
  release:
    types: [created]

env:
  QT_VERSION: 5.15.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
#          - os: ubuntu-22.04  # <-- Change from ubuntu-latest to ubuntu-22.04
#            arch: x86_64
#            use_jurplel: true
 #           qt_arch: gcc_64
 #           artifact_name: BASIC256-Linux-x86_64
#          - os: windows-latest
#            arch: x86_64
#            use_jurplel: true
#            qt_arch: win64_msvc2019_64  # Updated for MSVC 2019 / 2022 compatibility
#            artifact_name: BASIC256-Windows
          - os: ubuntu-latest
            arch: arm64
            use_jurplel: false
            artifact_name: BASIC256-RaspberryPi-ARM64  

    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2

    # Install Qt via jurplel for x86_64 Linux and Windows
    - name: Install Qt (jurplel)
      if: matrix.use_jurplel == true
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        arch: ${{ matrix.qt_arch }}
        cache: true
  
    # ---------------------------
    # Linux x86_64 Build
    # ---------------------------
    - name: Build Linux x86_64
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake libgl1-mesa-dev libx11-dev libxext-dev \
          libxrender-dev libxi-dev libxkbcommon-x11-0 \
          flex bison qttools5-dev-tools
        
        # Configure and Build using CMake
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${Qt5_DIR:-$Qt5_Dir}"
        cmake --build build --config Release -j$(nproc)

    # -----------------------------------------------------------------
    # Raspberry Pi ARM64 Emulated Build Flow
    # -----------------------------------------------------------------
    - name: Build and Package Raspberry Pi ARM64 via QEMU Container
      if: matrix.arch == 'arm64'
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: ubuntu22.04
        githubToken: ${{ github.token }}
        setup: |
          mkdir -p "${{ github.workspace }}/artifacts"
        run: |
          # 1. Install standard development dependencies inside ARM64 environment
          apt-get update && apt-get install -y build-essential cmake flex bison \
            qtbase5-dev qttools5-dev-tools qttools5-dev qtmultimedia5-dev \
            libqt5texttospeech5-dev libqt5serialport5-dev libgl1-mesa-dev \
            libx11-dev libespeak-ng-dev

          apt-get install -y patchelf  # For fixing up library paths in the distribution  

          # 2. Compile directly using native ARM64 tools
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j1  # Avoid parallel build on ARM to reduce memory pressure

          patchelf --set-rpath '$ORIGIN/lib' dist/basic256

          # 3. Create standalone relocatable pipeline distribution folder
          mkdir -p dist
          cp build/basic256 dist/
          # Copy Qt runtime libraries
          mkdir -p dist/lib
          cp /usr/lib/aarch64-linux-gnu/libQt5Core.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5Gui.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5Widgets.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5Multimedia.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5SerialPort.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5TextToSpeech.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5PrintSupport.so.* dist/lib/
          cp /usr/lib/aarch64-linux-gnu/libQt5Sql.so.* dist/lib/

          mkdir -p dist/plugins/platforms
          cp /usr/lib/aarch64-linux-gnu/qt5/plugins/platforms/libqxcb.so dist/plugins/platforms/
          
          mkdir -p dist/plugins/mediaservice
          cp /usr/lib/aarch64-linux-gnu/qt5/plugins/mediaservice/* dist/plugins/mediaservice/

          mkdir -p dist/plugins/imageformats
          cp /usr/lib/aarch64-linux-gnu/qt5/plugins/imageformats/* dist/plugins/imageformats/

          cp -r Examples dist/

          # 4. Generate dynamic compiled translations inside distribution target
          mkdir -p dist/Translations
          if ls build/*.qm 1> /dev/null 2>&1; then
            cp build/*.qm dist/Translations/
          elif ls Translations/*.qm 1> /dev/null 2>&1; then
            cp Translations/*.qm dist/Translations/
          fi

          # 5. Pack everything up for immediate collection
          tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    # ---------------------------
    # Windows Build
    # ---------------------------
    - name: Install flex and bison (Windows)
      if: runner.os == 'Windows'
      run: choco install winflexbison3 -y

    - name: Run Build (Windows)
      if: runner.os == 'Windows'
      env:
        BISON_PKGDATADIR: C:\ProgramData\chocolatey\lib\winflexbison3\tools\data
      run: |
        $bisonBin = "C:\ProgramData\chocolatey\lib\winflexbison3\tools"
        
        # Mirror flex/bison executables so names match standard conventions
        Copy-Item "$bisonBin\win_flex.exe" "$bisonBin\flex.exe" -Force
        Copy-Item "$bisonBin\win_bison.exe" "$bisonBin\bison.exe" -Force
        
        # Add bison tools to path for the lexer build step
        $env:Path = "$bisonBin;" + $env:Path

        # Generate LEX parser files manually using flex/bison direct execution
        cd LEX
        & "$bisonBin\bison.exe" -d -v -l basicParse.y
        & "$bisonBin\flex.exe" -L basicParse.l
        cd ..

        # Configure using MSVC (Omitting -G defaults to the installed Visual Studio version)
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="env:Qt5_DIR"
        
        # Build using MSVC compiler pipeline natively via CMake
        cmake --build build --config Release

    # ---------------------------
    # Packaging Linux x86_64
    # ---------------------------
    - name: Package Linux x86_64
      if: matrix.os == 'ubuntu-22.04'
      run: |
        mkdir -p dist
        cp build/basic256 dist/
        cp -r Examples dist/
        
        # Download linuxdeployqt asset
        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        
        # Point PATH to the exact folder containing the jurplel-installed Qt binaries (like qmake)
        export PATH="$Qt5_Dir/bin:$PATH"
        
        # Run linuxdeployqt without the invalid flag to bundle dependencies and plugins
        ./linuxdeployqt-continuous-x86_64.AppImage dist/basic256 -bundle-non-qt-libs -no-plugins --appimage-extract-and-run
        
        # Compress everything into your final delivery asset
        tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    # ---------------------------
    # Packaging Linux ARM
    # ---------------------------
    - name: Package Linux ARM
      if: matrix.os == 'ubuntu-24.04-arm'
      run: |
        mkdir -p dist
        cp build/basic256 dist/
        cp README.md dist/ || true
        # Copy Examples directly into the dist folder
        cp -r Examples dist/
        # For system Qt, we can find libs via a fallback layout since we aren't using qmake queries
        QT_LIB_DIR="/usr/lib/x86_64-linux-gnu"
        if [ "${{ matrix.arch }}" = "arm64" ] || [ "${{ matrix.os }}" = "ubuntu-24.04-arm" ]; then
            QT_LIB_DIR="/usr/lib/aarch64-linux-gnu"
        fi

        for lib in \
          libQt5Core \
          libQt5Gui \
          libQt5Widgets \
          libQt5Multimedia \
          libQt5MultimediaWidgets \
          libQt5Sql \
          libQt5PrintSupport \
          libQt5SerialPort \
          libQt5TextToSpeech \
          libQt5Network \
          libQt5DBus \
          libQt5XcbQpa; do
            find $QT_LIB_DIR /usr/lib -name "${lib}.so.5" 2>/dev/null | head -1 | xargs -I{} cp {} dist/ || true
        done

        # Copy runtime plugins
        mkdir -p dist/plugins/platforms
        mkdir -p dist/plugins/sqldrivers
        mkdir -p dist/plugins/audio
        QT_PLUGIN_DIR="/usr/lib/x86_64-linux-gnu/qt5/plugins"
        if [ -d "/usr/lib/aarch64-linux-gnu/qt5/plugins" ]; then
            QT_PLUGIN_DIR="/usr/lib/aarch64-linux-gnu/qt5/plugins"
        fi
        
        cp $QT_PLUGIN_DIR/platforms/libqxcb.so dist/plugins/platforms/ || true
        cp $QT_PLUGIN_DIR/sqldrivers/libqsqlite.so dist/plugins/sqldrivers/ || true
        cp $QT_PLUGIN_DIR/audio/libqtaudio_alsa.so dist/plugins/audio/ || true

        # Add launcher script
        printf '#!/bin/bash\n' > dist/run_basic256.sh
        printf 'DIR="$(cd "$(dirname "$0")" && pwd)"\n' >> dist/run_basic256.sh
        printf 'export LD_LIBRARY_PATH="$DIR:$LD_LIBRARY_PATH"\n' >> dist/run_basic256.sh
        printf 'export QT_PLUGIN_PATH="$DIR/plugins"\n' >> dist/run_basic256.sh
        printf 'exec "$DIR/basic256" "$@"\n' >> dist/run_basic256.sh
        chmod +x dist/run_basic256.sh

        tar -czf ${{ matrix.artifact_name }}.tar.gz dist

    # ---------------------------
    # Packaging Windows (MSVC Migration)
    # ---------------------------
    - name: Package Windows Build
      if: runner.os == 'Windows'
      run: |
        mkdir dist
        Set-Content -Path "dist\basic256.bat" -Value "@echo off`r`nset QT_OPENGL=desktop`r`nstart basic256.exe"
        
        # MSVC multi-config generator outputs binaries into a 'Release' subfolder
        Copy-Item build\Release\basic256.exe dist\

        # Copy Examples directly into the dist folder before compressing
        Copy-Item -Path "Examples" -Destination "dist\Examples" -Recurse -Force       
        
        # Deploy deployment assets using MSVC-built windeployqt
        & "$env:Qt5_Dir\bin\windeployqt.exe" `
          --dir dist `
          --multimedia `
          --no-translations `
          dist\basic256.exe
          
        if (Test-Path "dist\translations") {
            Move-Item "dist\translations" "dist\Translations_Temp"
            Move-Item "dist\Translations_Temp" "dist\Translations" -Force
        }
        if (-not (Test-Path "dist\Translations")) {
            New-Item -ItemType Directory -Path "dist\Translations" | Out-Null
        }
        
        if (Test-Path "build\basic256_en.qm") {
            Copy-Item "build\*.qm" "dist\Translations\" -Force
        } elseif (Test-Path "Translations") {
            Copy-Item "Translations\*.qm" "dist\Translations\" -Force
        }
        
        Remove-Item "dist\libGLESv2.dll", "dist\libEGL.dll", "dist\opengl32sw.dll" -ErrorAction SilentlyContinue
        Copy-Item "$env:Qt5_Dir\bin\Qt5OpenGL.dll" dist\ -Force
        Copy-Item "$env:Qt5_Dir\bin\Qt5MultimediaWidgets.dll" dist\ -Force
        Copy-Item "$env:Qt5_Dir\bin\Qt5PrintSupport.dll" dist\ -Force
        Compress-Archive -Path dist -DestinationPath ${{ matrix.artifact_name }}.zip

    # ---------------------------
    # Upload Artifacts Step
    # ---------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4.6.2
      with:
        name: ${{ matrix.artifact_name }}
        if-no-files-found: ignore  # Tells the runner to not crash if one of the extensions is missing
        path: |
          ${{ github.workspace }}/*.tar.gz
          ${{ github.workspace }}/*.zip

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.3.0
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.tar.gz
          **/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}